version: '3.9'

# ─────────────────────────────────────────────────────────────
#  Echo Chat — Docker Compose
#
#  Services:
#    redis    — Redis 7 (Pub/Sub + persistence)
#    backend  — Node.js WebSocket server (scalable: replicas)
#    nginx    — Reverse proxy / WebSocket load balancer
#    frontend — Vite dev server (dev profile only)
# ─────────────────────────────────────────────────────────────

services:

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: echo_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - echo_net

  # ── Backend (can be scaled: docker compose up --scale backend=3) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT:      8080
      NODE_ENV:  production
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - echo_net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ── Nginx — load balancer + WebSocket proxy ─────────────────
  nginx:
    image: nginx:alpine
    container_name: echo_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - echo_net

  # ── Frontend dev server (start with: docker compose --profile dev up) ──
  frontend:
    profiles: ["dev"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: echo_frontend_dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_WEBSOCKET_URL: ws://localhost/ws
    networks:
      - echo_net

volumes:
  redis_data:
    driver: local

networks:
  echo_net:
    driver: bridge