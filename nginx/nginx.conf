worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ───────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  # ── Performance ───────────────────────────────────────────
  sendfile       on;
  tcp_nopush     on;
  tcp_nodelay    on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/xml+rss text/javascript;

  # ── WebSocket upstream — round-robin across backend replicas ──
  # Docker Compose scales: docker compose up --scale backend=3
  upstream ws_backend {
    # ip_hash ensures a client always hits the same instance if needed
    # (not strictly required with Redis Pub/Sub, but good for session affinity)
    ip_hash;
    server backend:8080;
    keepalive 32;
  }

  # ── Rate limiting ─────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=30r/s;

  # ── Server ───────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # ── Static frontend (built Vite dist) ─────────────────
    root  /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
      try_files $uri $uri/ /index.html;
    }

    # ── WebSocket proxy ───────────────────────────────────
    location /ws {
      limit_req zone=ws_limit burst=20 nodelay;

      proxy_pass         http://ws_backend;
      proxy_http_version 1.1;

      # WebSocket handshake headers
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";

      # Pass real client IP
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Timeouts — keep WS connections alive
      proxy_read_timeout  3600s;
      proxy_send_timeout  3600s;
      proxy_connect_timeout 10s;

      # Buffer tuning
      proxy_buffering off;
    }

    # ── Health check passthrough ──────────────────────────
    location /health {
      proxy_pass http://ws_backend;
      proxy_set_header Host $host;
      access_log off;
    }

    # ── Security headers ──────────────────────────────────
    add_header X-Frame-Options        DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";
    add_header Referrer-Policy        "strict-origin-when-cross-origin";
  }
}